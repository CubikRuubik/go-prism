name: Analyze Go Changes

on:
  pull_request:
    branches: [main]
    types: [closed]
    paths:
      - "**.go"

jobs:
  analyze:
    name: "Analyze Go diff and apply to Rust"
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read

    steps:
      - name: Checkout Go repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Rust repo
        uses: actions/checkout@v4
        with:
          repository: CubikRuubik/rust-prism
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: rust-repo

      - name: Get Go diff
        id: diff
        run: |
          DIFF=$(git diff ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.merge_commit_sha }} -- '*.go')
          if [ -z "$DIFF" ]; then
            echo "No Go changes detected"
            echo "has_diff=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "$DIFF" > /tmp/go_diff.txt
          echo "has_diff=true" >> $GITHUB_OUTPUT

          echo "========== GO DIFF =========="
          cat /tmp/go_diff.txt
          echo "============================="

      - name: Analyze Go changes
        if: steps.diff.outputs.has_diff == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json
          diff = open('/tmp/go_diff.txt').read()
          payload = {
            'model': 'openai/gpt-4.1-mini',
            'messages': [{
              'role': 'user',
              'content': 'Analyze this Go code diff. Describe each change as a structured bullet point: what was added, modified, or removed. Be precise about function names, signatures, and logic.\n\nDiff:\n' + diff
            }],
            'temperature': 0.1
          }
          print(json.dumps(payload))
          " > /tmp/payload.json

          RESPONSE=$(curl -s -X POST \
            "https://models.github.ai/inference/chat/completions" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json)

          ANALYSIS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Failed to parse response"')

          echo "========== AI ANALYSIS =========="
          echo "$ANALYSIS"
          echo "================================="

          echo "$ANALYSIS" > /tmp/go_analysis.txt

      - name: Generate Rust changes
        if: steps.diff.outputs.has_diff == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUST_CODE=""
          for f in $(find rust-repo/src -name '*.rs' 2>/dev/null); do
            RELATIVE=${f#rust-repo/}
            RUST_CODE="$RUST_CODE
          // FILE: $RELATIVE
          $(cat "$f")
          "
          done

          if [ -z "$RUST_CODE" ]; then
            RUST_CODE="// No Rust source files found"
          fi

          echo "$RUST_CODE" > /tmp/rust_code.txt

          python3 -c "
          import json

          analysis = open('/tmp/go_analysis.txt').read()
          rust_code = open('/tmp/rust_code.txt').read()

          payload = {
            'model': 'openai/gpt-4.1-mini',
            'messages': [{
              'role': 'user',
              'content': '''You are a Rust developer applying changes based on a Go change analysis.

          TASK:
          1. Read the analysis of recent Go changes
          2. Read the current Rust code
          3. If the Rust code already reflects these changes, output ONLY: NO CHANGES NEEDED
          4. Otherwise, output the COMPLETE updated Rust file(s)

          RULES:
          - Output ONLY a JSON object mapping file paths to their full updated content
          - Example: {\"src/main.rs\": \"fn main() { ... }\"}
          - Use idiomatic Rust (Result, Option, ownership, etc.)
          - Preserve existing Rust code that is unrelated to the changes
          - No markdown fences, no explanations, only valid JSON or NO CHANGES NEEDED

          GO CHANGES ANALYSIS:
          ''' + analysis + '''

          CURRENT RUST CODE:
          ''' + rust_code
            }],
            'temperature': 0.1
          }
          print(json.dumps(payload))
          " > /tmp/rust_payload.json

          RESPONSE=$(curl -s -X POST \
            "https://models.github.ai/inference/chat/completions" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/rust_payload.json)

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "FAILED"')

          echo "========== AI RUST OUTPUT =========="
          echo "$CONTENT"
          echo "===================================="

          echo "$CONTENT" > /tmp/rust_output.txt

      - name: Apply changes and create PR
        if: steps.diff.outputs.has_diff == 'true'
        env:
          CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          CONTENT=$(cat /tmp/rust_output.txt)

          if [ "$CONTENT" = "NO CHANGES NEEDED" ] || [ "$CONTENT" = "FAILED" ]; then
            echo "No Rust changes to apply"
            exit 0
          fi

          # Parse JSON and write files
          python3 -c "
          import json, os

          content = open('/tmp/rust_output.txt').read().strip()
          if content.startswith('\`\`\`'):
            content = '\n'.join(content.split('\n')[1:])
          if content.endswith('\`\`\`'):
            content = '\n'.join(content.split('\n')[:-1])

          files = json.loads(content)
          for path, code in files.items():
            full = os.path.join('rust-repo', path)
            os.makedirs(os.path.dirname(full), exist_ok=True)
            with open(full, 'w') as f:
              f.write(code)
            print(f'Written: {full}')
          "

          cd rust-repo

          # Use same branch name as Go PR
          GO_BRANCH="${{ github.event.pull_request.head.ref }}"
          BRANCH="$GO_BRANCH"

          git config user.name "translate-bot"
          git config user.email "translate-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A

          if git diff --cached --quiet; then
            echo "No file changes to commit"
            exit 0
          fi

          git commit -m "${{ github.event.pull_request.title }}"
          git push "https://x-access-token:${CROSS_REPO_PAT}@github.com/CubikRuubik/rust-prism.git" "$BRANCH"

          # Use same PR title as Go PR
          GO_PR_TITLE="${{ github.event.pull_request.title }}"
          GO_PR_URL="${{ github.event.pull_request.html_url }}"

          PR_BODY="Automated Rust translation of Go changes.\n\nSource PR: ${GO_PR_URL}\n\n> Review carefully. LLM-generated code."

          curl -s -X POST \
            -H "Authorization: token $CROSS_REPO_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/CubikRuubik/rust-prism/pulls" \
            -d "$(python3 -c "
          import json
          print(json.dumps({
            'title': '''$GO_PR_TITLE''',
            'body': '''$(echo -e "$PR_BODY")''',
            'head': '$BRANCH',
            'base': 'main'
          }))")"
